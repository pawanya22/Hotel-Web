<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Luxe Hotels | Curated Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f3e5ab;
      --bg-dark: #0a0a0a;
      --text-light: #fdfbf7;
      --bg-light: #fcfbf9;
      --text-dark: #121212;
      --glass-bg: rgba(0, 0, 0, 0.6);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      cursor: default;
    }
    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
      position: relative;
    }
    /* 3D pattern overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.5;
      background-image: 
        repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 2px, transparent 2px, transparent 12px),
        repeating-linear-gradient(135deg, rgba(0, 0, 0, 0.08) 0px, rgba(0, 0, 0, 0.08) 2px, transparent 2px, transparent 12px),
        repeating-linear-gradient(225deg, rgba(255, 255, 255, 0.25) 0px, rgba(255, 255, 255, 0.25) 2px, transparent 2px, transparent 12px),
        repeating-linear-gradient(315deg, rgba(255, 255, 255, 0.22) 0px, rgba(255, 255, 255, 0.22) 2px, transparent 2px, transparent 12px),
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px),
        radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.08) 1.5px, transparent 1.5px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 60px 60px;
      background-position: 0px 0px, 0px 0px, 20px 20px, 20px 20px, 0px 0px, 15px 15px;
      mix-blend-mode: overlay;
    }
    .noise-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    nav {
      position: fixed;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1400px;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 100px;
      z-index: 1000;
      transition: background 0.4s ease;
    }
    nav.scrolled {
      background: rgba(10, 10, 10, 0.9);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      letter-spacing: 5px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }
    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: #fff;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.8;
      transition: all 0.4s ease;
      font-weight: 400;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s ease;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--gold);
    }
    .nav-links a:hover::after {
      width: 100%;
    }
    .nav-right {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .nav-right a {
      color: #fff;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: 0.3s;
      opacity: 0.8;
      cursor: pointer;
    }
    .nav-right a:hover {
      opacity: 1;
    }
    .btn-circle {
      position: relative;
      width: 110px;
      height: 44px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      background: transparent;
      overflow: hidden;
      z-index: 1;
      cursor: pointer;
    }
    .btn-circle::before {
      content: '';
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--gold);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: -1;
      border-radius: 50% 50% 0 0;
    }
    .btn-circle:hover::before {
      top: 0;
      border-radius: 0;
    }
    .btn-circle:hover {
      color: #000;
      border-color: var(--gold);
      letter-spacing: 3px;
    }
    .view {
      display: none;
      width: 100%;
    }
    .view.active-view {
      display: block;
    }
    .hotels-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .hotel-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.5s, box-shadow 0.5s;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .hotel-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.1);
    }
    .hotel-card-img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      transition: transform 1s ease;
    }
    .hotel-card:hover .hotel-card-img {
      transform: scale(1.05);
    }
    .hotel-card-info {
      padding: 20px;
    }
    .hotel-card-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hotel-card-info p {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--gold);
      text-transform: uppercase;
    }
    .hotel-location {
      font-size: 0.7rem;
      margin-top: 6px;
      opacity: 0.7;
    }
    .detail-container {
      max-width: 1300px;
      margin: 140px auto 80px;
      padding: 0 40px;
    }
    .back-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      align-items: center;
    }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.2);
      padding: 8px 24px;
      border-radius: 40px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      font-weight: 500;
      transition: 0.3s;
      cursor: pointer;
    }
    .back-btn:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }
    .hotel-name-detail {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 400;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    /* New hotel description style */
    .hotel-description-detail {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #3a3a3a;
      margin: 20px 0 32px 0;
      padding-right: 1rem;
      border-left: 3px solid var(--gold);
      padding-left: 24px;
      font-weight: 400;
      max-width: 85%;
      letter-spacing: 0.2px;
      background: rgba(212, 175, 55, 0.03);
      border-radius: 0 12px 12px 0;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 10px 0 40px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding-bottom: 20px;
    }
    .cat-btn {
      background: transparent;
      border: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 0;
      color: #5a5a5a;
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }
    .cat-btn.active {
      color: var(--gold);
    }
    .cat-btn::after {
      content: '';
      position: absolute;
      bottom: -21px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gold);
      transition: 0.3s;
    }
    .cat-btn.active::after {
      width: 100%;
    }
    .detail-content {
      display: flex;
      gap: 50px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .detail-photo {
      flex: 1.2;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .detail-photo img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      max-height: 500px;
    }
    .detail-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.8;
      opacity: 0.8;
    }
    footer {
      padding: 100px 60px 40px;
      background: var(--bg-dark);
      color: white;
      margin-top: 80px;
    }
    .footer-bottom {
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 50px;
      opacity: 0.5;
    }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      letter-spacing: 8px;
      display: block;
      margin-bottom: 15px;
    }
    @media (max-width: 1100px) {
      .hotels-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .hotel-description-detail {
        max-width: 100%;
        font-size: 0.95rem;
        padding-left: 20px;
      }
    }
    @media (max-width: 700px) {
      .hotels-grid {
        grid-template-columns: 1fr;
      }
      .nav-links {
        display: none;
      }
      .hotel-name-detail {
        font-size: 2rem;
      }
      .button-row {
        gap: 12px;
      }
      .cat-btn {
        font-size: 0.7rem;
      }
      .hotel-description-detail {
        font-size: 0.9rem;
        padding-left: 16px;
        margin: 16px 0 24px;
      }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>

  <nav id="navbar">
    <div style="display: flex; align-items: center; gap: 20px;">
      <a href="index.html" class="logo">LUXE WELLNESS CLUB</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">HOME</a></li>
      <li><a href="hotel.html" style="opacity:1; color:var(--gold);">HOTELS</a></li>
      <li><a href="index.html#">MAGAZINE</a></li>
      <li><a href="index.html#">ABOUT</a></li>
      <li><a href="index.html#">CONTACT</a></li>
    </ul>
    <div class="nav-right">
      <a href="#">EN</a>
      <a href="#" class="btn-circle" style="width: 90px;">LOGIN</a>
    </div>
  </nav>

  <!-- LIST VIEW: 20 hotel cards -->
  <div id="listView" class="view active-view">
    <div style="max-width:1300px; margin:140px auto 40px; padding:0 40px;">
      <h2 style="font-family:'Playfair Display'; font-size:3rem; text-align:center; margin-bottom:20px;">20 EXCEPTIONAL HOTELS</h2>
      <p style="text-align:center; margin-bottom:60px; letter-spacing:2px;">Curated for the discerning traveler</p>
      <div id="hotelsGrid" class="hotels-grid"></div>
    </div>
    <footer>
      <div class="footer-bottom">
        <span class="footer-logo">LUXE WELLNESS CLUB</span>
        <p>HOTEL COLLECTION</p>
      </div>
    </footer>
  </div>

  <!-- DETAIL VIEW: hotel name + description (unique 50 words) + 5 buttons (Room 1, Room 2, Gallery, Services, Contacts) -->
  <div id="detailView" class="view">
    <div class="detail-container">
      <div class="back-bar">
        <button id="backToListBtn" class="back-btn">← BACK TO HOTELS</button>
        <button id="backToHomeBtn" class="back-btn">HOME</button>
      </div>
      <h1 id="detailHotelName" class="hotel-name-detail"></h1>
      <!-- NEW: Hotel description area (50 words each, unique per hotel) -->
      <div id="hotelDetailDescription" class="hotel-description-detail"></div>
      <div id="categoryButtons" class="button-row"></div>
      <div id="detailContentArea" class="detail-content"></div>
    </div>
    <footer>
      <div class="footer-bottom">
        <span class="footer-logo">LUXE WELLNESS CLUB</span>
        <p>LUXURY HOTEL EXPERIENCE</p>
      </div>
    </footer>
  </div>

  <script>
    // ======================= 20 HOTELS DATA with UNIQUE 50-WORD DESCRIPTIONS =======================
    const hotelNames = [
      "Aethelburg House", "Villa Serene", "The Golden Peaks", "Azure Coast Palace", "Saffron Retreat",
      "Noir et Or", "Celestial Bay", "Ritzhaven", "The Eden Cliff", "Opaline Estate",
      "Valmont Sanctuary", "Onyx Pavilion", "Prestige Helios", "Solis Grand", "La Perla Blu",
      "Château Lumière", "The Royal Mist", "Velvet Sands", "Haven Crest", "Lumina Palace"
    ];
    const locations = [
      "Swiss Alps", "Amalfi Coast", "Kyoto, Japan", "Maldives", "Tuscany",
      "Paris", "Santorini", "Bali", "Aspen", "Lake Como",
      "Ibiza", "Dubai", "French Riviera", "Himalayas", "Cape Town",
      "Big Sur", "Phuket", "Costa Rica", "Marrakech", "Maui"
    ];
    const mainImages = [
      "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", "https://images.unsplash.com/photo-1584132967334-10e028bd69f7?w=800",
      "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=800", "https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?w=800",
      "https://images.unsplash.com/photo-1582719508461-905c673771fd?w=800", "https://images.unsplash.com/photo-1590073242678-70ee3fc28f8e?w=800",
      "https://images.unsplash.com/photo-1445019980597-93fa8acb246c?w=800", "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=800",
      "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", "https://images.unsplash.com/photo-1535827841776-24afc1e255ac?w=800",
      "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800", "https://images.unsplash.com/photo-1516307365426-bea591f05011?w=800",
      "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=800", "https://images.unsplash.com/photo-1521119989659-a83eee488004?w=800",
      "https://images.unsplash.com/photo-1590496793929-36417d3117de?w=800", "https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800",
      "https://images.unsplash.com/photo-1545579133-99bb5ab189bd?w=800", "https://images.unsplash.com/photo-1468824357306-a439d58ccb1c?w=800",
      "https://images.unsplash.com/photo-1559599238-308793639427?w=800", "https://images.unsplash.com/photo-1582719508461-905c673771fd?w=800"
    ];

    // Unique 50-word descriptions (each crafted ~45-60 words, tailored to hotel name & location)
    const hotelDescriptions = [
      "Aethelburg House, nestled in the Swiss Alps, blends alpine charm with timeless luxury. Ancient stone walls meet contemporary interiors, offering a secluded sanctuary. Enjoy private chalets, a Michelin-starred fondue cellar, and breathtaking Matterhorn views. Ideal for those seeking tranquility and heritage in an exclusive mountain setting.",
      "Villa Serene on the Amalfi Coast cascades down lemon-scented cliffs. This whitewashed masterpiece features infinity pools melting into the Tyrrhenian Sea, grotto spa experiences, and hand-painted frescoes. A hideaway for romantics and art lovers, where every sunset feels like a private opera.",
      "The Golden Peaks in Kyoto harmonizes Zen tradition with modern minimalism. Suites overlook moss gardens and ancient temples. Experience kaiseki dining, onsen baths fed by natural springs, and ikebana workshops. A spiritual retreat where centuries-old rituals meet quiet sophistication.",
      "Azure Coast Palace in the Maldives rises above crystal lagoons. Overwater villas feature glass floors, private butlers, and underwater restaurants. Dive into coral gardens, enjoy sunrise yoga on private decks, and indulge in holistic wellness. Pure oceanic elegance redefined.",
      "Saffron Retreat in Tuscany is a restored 12th-century monastery surrounded by vineyards and cypress trees. Rustic yet opulent, it offers truffle hunting, wine tastings in ancient cellars, and thermal pools. A pastoral escape where time slows and senses awaken.",
      "Noir et Or in Paris channels Art Deco grandeur with a contemporary edge. Situated near the Seine, suites feature gold-leaf ceilings and city panoramas. Enjoy a clandestine cocktail bar, haute couture spa, and gastronomic dining by a three-Michelin-star chef. Parisian noir meets golden age.",
      "Celestial Bay in Santorini perches on caldera cliffs with sweeping Aegean views. Cycladic architecture blends with volcanic stone suites, private plunge pools, and sunset-facing terraces. Indulge in wine tastings from local vineyards and Mediterranean-inspired therapies.",
      "Ritzhaven in Bali offers jungle villas with thatched roofs and open-air living. Sacred river views, Balinese healing rituals, and farm-to-table cuisine define this eco-luxury sanctuary. Disconnect amidst rice terraces and ancient temples, embracing the island's spiritual heartbeat.",
      "The Eden Cliff in Aspen is a modern alpine lodge with reclaimed timber and floor-to-ceiling windows. Ski-in/ski-out access, a world-class wellness center, and curated art collection. Après-ski experiences include fireside cognac tastings and private mountain guides.",
      "Opaline Estate on Lake Como blends Renaissance elegance with contemporary luxury. Murano chandeliers, lakeside gardens, and a private vintage Riva boat. Each suite tells a story of Italian craftsmanship. Perfect for travelers who cherish cinematic romance and old-world glamour.",
      "Valmont Sanctuary in Ibiza fuses bohemian spirit with holistic wellness. Whitewashed finca, organic gardens, and sunrise meditation pavilions. By day, enjoy sound healing; by night, exclusive sunset beats. A creative haven for free spirits seeking balance and beauty.",
      "Onyx Pavilion in Dubai redefines urban opulence with its 360-degree skyline views. Floor-to-ceiling onyx walls, infinity pools in the clouds, and a private art gallery. Michelin-starred dining and unparalleled butler service. A vertical oasis in the desert metropolis.",
      "Prestige Helios on the French Riviera channels Belle Époque splendor. Pastel façades, palm-fringed terraces, and a legendary casino. Suites boast sea-view balconies and curated champagne bars. Glamour, yachts, and timeless soirées—a rendezvous with the jet set.",
      "Solis Grand in the Himalayas is a mountain fortress offering panoramic peaks and Buddhist tranquility. Stone and timber architecture, Ayurvedic retreats, and guided Himalayan treks. Starlit sky observatories and library of ancient texts create a soul-stirring escape.",
      "La Perla Blu in Cape Town combines coastal vibrancy with African luxury. Perched above Camps Bay, it features ocean-facing infinity pools, contemporary art, and fynbos-scented spa treatments. Explore Table Mountain or simply watch whales from your suite.",
      "Château Lumière in Big Sur is a clifftop sanctuary amidst redwood forests. Sustainable architecture, glass-walled suites, and private coastal trails. Enjoy farm-to-table dining, stargazing decks, and Japanese hot baths. Raw nature meets refined minimalism.",
      "The Royal Mist in Phuket unveils Thai royal heritage through silk-draped pavilions and private beach coves. Traditional long-tail boat excursions, Muay Thai wellness, and spice-infused cuisine. An enclave of Andaman serenity with a touch of Siamese grandeur.",
      "Velvet Sands in Costa Rica embraces pura vida with eco-luxury treehouses and pristine Pacific beaches. Canopy ziplines, sea turtle conservation, and open-air yoga decks. Immerse in rainforest biodiversity while enjoying world-class sustainability and barefoot elegance.",
      "Haven Crest in Marrakech is a medina jewel with intricate zellige tiles and rose-petal courtyards. Rooftop terraces overlook the Atlas Mountains. Experience traditional hammams, spice souk tours, and Berber hospitality. A sensory journey into Moroccan mystique.",
      "Lumina Palace in Maui celebrates Hawaiian spirit with oceanfront villas and lava rock infinity pools. Cultural ceremonies, outrigger canoe adventures, and farm-to-table luaus. Surrounded by emerald cliffs and golden shores, it’s a radiant paradise of aloha luxury."
    ];

    function generateHotels() {
      let hotels = [];
      for (let i = 0; i < 20; i++) {
        const name = hotelNames[i];
        const location = locations[i];
        const mainImg = mainImages[i % mainImages.length];
        const uniqueDesc = hotelDescriptions[i]; // unique 50-word description
        
        // Categories: Room 1, Room 2, Gallery, Services, Contacts
        const categories = [
          {
            title: "Room 1",
            description: `Experience the elegance of our ${name} Deluxe Suite. Spanning 65 sqm, this room features a king-size bed, marble bathroom with rain shower, and a private balcony overlooking the ${location}. Enjoy personalized butler service and complimentary access to the executive lounge.`,
            imageUrl: `https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=800&sig=${i}r1`
          },
          {
            title: "Room 2",
            description: `The Presidential Suite at ${name} offers unparalleled luxury with 150 sqm of space, separate living and dining areas, a grand piano, and panoramic views of ${location}. Indulge in a private spa treatment room and 24/7 dedicated concierge.`,
            imageUrl: `https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800&sig=${i}r2`
          },
          {
            title: "Gallery",
            description: `Step into a visual journey through ${name}. Our curated gallery showcases the architectural beauty, serene gardens, and breathtaking moments captured by world‑renowned photographers. Each corner tells a story of timeless luxury.`,
            imageUrl: `https://images.unsplash.com/photo-1558036117-15d82a90b9b1?w=800&sig=${i}g`
          },
          {
            title: "Services",
            description: `From Michelin‑starred dining to a holistic spa and state‑of‑the‑art fitness center, ${name} offers an array of premium services. Enjoy 24‑hour room service, private transfers, and bespoke experiences crafted just for you.`,
            imageUrl: `https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800&sig=${i}s`
          },
          {
            title: "Contacts",
            description: `Reach us at ${name}: ${location}. Phone: +41 22 555 1234, Email: concierge@${name.toLowerCase().replace(/\s/g,'')}.com. Our dedicated team is available 24/7 to assist with reservations, special requests, or any inquiries.`,
            imageUrl: `https://images.unsplash.com/photo-1582719508461-905c673771fd?w=800&sig=${i}c`
          }
        ];
        
        hotels.push({ id: i, name, location, mainImage: mainImg, categories, description: uniqueDesc });
      }
      return hotels;
    }

    const hotelsData = generateHotels();
    let currentHotel = null;
    let activeCat = 0;

    const listView = document.getElementById('listView');
    const detailView = document.getElementById('detailView');
    const hotelsGrid = document.getElementById('hotelsGrid');
    const detailHotelName = document.getElementById('detailHotelName');
    const hotelDetailDescription = document.getElementById('hotelDetailDescription');
    const categoryButtonsDiv = document.getElementById('categoryButtons');
    const detailContentArea = document.getElementById('detailContentArea');

    function showView(view) {
      listView.classList.remove('active-view');
      detailView.classList.remove('active-view');
      view.classList.add('active-view');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderHotelCards() {
      hotelsGrid.innerHTML = '';
      hotelsData.forEach(hotel => {
        const card = document.createElement('div');
        card.className = 'hotel-card';
        card.innerHTML = `
          <img class="hotel-card-img" src="${hotel.mainImage}" alt="${hotel.name}" loading="lazy">
          <div class="hotel-card-info">
            <h3>${hotel.name}</h3>
            <p>${hotel.location}</p>
            <div class="hotel-location">✦ LUXURY RETREAT</div>
          </div>
        `;
        card.addEventListener('click', () => openHotelDetail(hotel.id));
        hotelsGrid.appendChild(card);
      });
    }

    function openHotelDetail(id) {
      currentHotel = hotelsData.find(h => h.id === id);
      if (!currentHotel) return;
      activeCat = 0;
      renderDetailView();
      showView(detailView);
    }

    function renderDetailView() {
      detailHotelName.innerText = currentHotel.name;
      // Insert the unique ~50 word description (after hotel name, before buttons)
      hotelDetailDescription.innerText = currentHotel.description;
      
      categoryButtonsDiv.innerHTML = '';
      currentHotel.categories.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.innerText = cat.title;
        btn.className = 'cat-btn' + (idx === activeCat ? ' active' : '');
        btn.addEventListener('click', () => {
          activeCat = idx;
          renderDetailView();
        });
        categoryButtonsDiv.appendChild(btn);
      });
      const cat = currentHotel.categories[activeCat];
      detailContentArea.innerHTML = `
        <div class="detail-photo"><img src="${cat.imageUrl}" alt="${cat.title}"></div>
        <div class="detail-text"><h3 style="font-family:'Playfair Display'; margin-bottom:20px;">${cat.title}</h3><p>${cat.description}</p></div>
      `;
    }

    // Navigation
    document.getElementById('backToListBtn').addEventListener('click', () => showView(listView));
    document.getElementById('backToHomeBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    document.querySelector('.logo').addEventListener('click', () => { window.location.href = 'index.html'; });

    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (window.scrollY > 50) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    });

    renderHotelCards();
  </script>
</body>
</html>
